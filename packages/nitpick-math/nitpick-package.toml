[package]
name = "nitpick-math"
version = "0.2.0"
authors = ["Nitpick Language Project"]
license = "MIT"
description = "Mathematical functions for Nitpick — trig, exponential, logarithm, rounding, and more via C libm"
keywords = ["math", "trig", "sin", "cos", "sqrt", "libm", "float"]
categories = ["math", "std-extensions"]

[dependencies]
# No Nitpick package dependencies.
# Runtime dependency: C libm (link with -lm / link_libraries = ["m"])

[build]
type = "library"
entry = "src/nitpick_math.npk"
link_libraries = ["m"]
