[package]
name = "nitpick-console"
version = "0.11.2"
authors = ["Nitpick Language Project"]
license = "MIT"
description = "Virtual 8-bit console address map and frame scheduler — Nitpick + nitpick-libc_mem"
keywords = ["console", "virtual", "memory-map", "frame-scheduler"]
categories = ["graphics"]

[dependencies]
nitpick-libc = "0.10.0"

[build]
type = "library"
entry = "src/nitpick_console.npk"
link_libraries = ["nitpick_libc_mem"]
