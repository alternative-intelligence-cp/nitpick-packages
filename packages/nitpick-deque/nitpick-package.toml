[package]
name = "nitpick-deque"
version = "0.11.3"
description = "Double-ended queue with O(1) push/pop at both ends (circular buffer)"
license = "MIT"
repository = "https://github.com/alternative-intelligence-cp/nitpick-packages"
categories = ["data-structures"]

[dependencies]
nitpick-libc = "0.10.0"

[build]
type = "library"
entry = "src/nitpick_deque.npk"
link_libraries = ["nitpick_libc_mem"]
