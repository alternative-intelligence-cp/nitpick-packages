[package]
name = "nitpick-msgpack"
version = "0.11.2"
description = "MessagePack binary serialization — Nitpick + nitpick-libc_mem"
license = "MIT"
repository = "https://github.com/alternative-intelligence-cp/nitpick-packages"
categories = ["serialization", "binary"]

[dependencies]
nitpick-libc = "0.10.0"

[build]
type = "library"
entry = "src/nitpick_msgpack.npk"
link_libraries = ["nitpick_libc_mem"]
