[package]
name = "nitpick-raylib"
version = "0.3.0"
authors = ["Nitpick Language Project"]
license = "Apache-2.0 WITH Runtime-Library-Exception"
description = "Raylib bindings for Nitpick — windowing, 2D drawing, textures, audio, input, and text rendering via C shim"
keywords = ["raylib", "gui", "graphics", "gamedev", "2d", "ffi", "audio", "texture"]
categories = ["graphics", "gamedev"]

[dependencies]

[build]
type = "library"
entry = "src/nitpick_raylib.npk"
link_libraries = ["nitpick_raylib_shim", "raylib"]
