[package]
name = "nitpick-mime"
version = "0.11.2"
description = "MIME type detection from file extensions — Nitpick + aria-libc_string"
license = "MIT"
repository = "https://github.com/alternative-intelligence-cp/aria-packages"
categories = ["text", "web"]

[dependencies]
aria-libc = "0.10.0"

[build]
type = "library"
entry = "src/nitpick_mime.npk"
link_libraries = ["aria_libc_string"]
