[package]
name = "nitpick-json"
version = "0.2.0"
authors = ["Nitpick Language Project"]
license = "MIT"
description = "JSON tokeniser for Nitpick — byte-level scanning with malloc/free for zero-copy token-type arrays"
keywords = ["json", "tokenizer", "parsing", "lexer"]
categories = ["parsing", "data-formats"]

[build]
type = "shim"
entry = "src/nitpick_json.npk"
link_libraries = ["nitpick_json_shim"]
