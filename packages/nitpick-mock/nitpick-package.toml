[package]
name = "nitpick-mock"
version = "0.11.2"
description = "Lightweight mock/stub framework for testing — Nitpick + nitpick-libc_mem"
license = "MIT"
repository = "https://github.com/alternative-intelligence-cp/nitpick-packages"
categories = ["testing", "mock"]

[dependencies]
nitpick-libc = "0.10.0"

[build]
type = "library"
entry = "src/nitpick_mock.npk"
link_libraries = ["nitpick_libc_mem"]
