[package]
name = "nitpick-buf"
version = "0.2.0"
authors = ["Nitpick Language Project"]
license = "MIT"
description = "Byte and word packing/unpacking operations for uint64 buffers (little-endian)"
keywords = ["buffer", "bytes", "packing", "uint64", "endian", "bitops"]
categories = ["data", "utilities"]

[build]
type = "library"
entry = "src/nitpick_buf.npk"
